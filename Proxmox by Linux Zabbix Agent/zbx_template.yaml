  triggers:
    - uuid: df0a69f506844399b94a4c78a84c4158
      expression: 'last(/Proxmox by Linux Zabbix agent/proc.num)/last(/Proxmox by Linux Zabbix agent/kernel.maxproc)*100>80'
      name: 'Linux: Getting closer to process limit'
      event_name: 'Linux: Getting closer to process limit (over 80% used)'
      opdata: '{ITEM.LASTVALUE1} active, {ITEM.LASTVALUE2} limit.'
      priority: WARNING
      tags:
        - tag: scope
          value: performance
    - uuid: 61a4774582034d4db12de4971078f3c1
      expression: 'max(/Proxmox by Linux Zabbix agent/system.swap.size[,pfree],5m)<80 and last(/Proxmox by Linux Zabbix agent/system.swap.size[,total])>0'
      name: 'Linux: High swap space usage'
      event_name: 'Linux: High swap space usage (less than 80% free)'
      opdata: 'Free: {ITEM.LASTVALUE1}, total: {ITEM.LASTVALUE2}'
      priority: WARNING
      description: 'If there is no swap configured, this trigger is ignored.'
      dependencies:
        - name: 'Linux: High memory utilization'
          expression: 'min(/Proxmox by Linux Zabbix agent/vm.memory.utilization,5m)>90'
        - name: 'Linux: Lack of available memory'
          expression: 'max(/Proxmox by Linux Zabbix agent/vm.memory.size[available],5m)<20M and last(/Proxmox by Linux Zabbix agent/vm.memory.size[total])>0'
      tags:
        - tag: scope
          value: capacity
    - uuid: f958c1f8abe545668153510ff56ecf70
      expression: 'max(/Proxmox by Linux Zabbix agent/vm.memory.size[available],5m)<20M and last(/Proxmox by Linux Zabbix agent/vm.memory.size[total])>0'
      name: 'Linux: Lack of available memory'
      event_name: 'Linux: Lack of available memory (<{$MEMORY.AVAILABLE.MIN} of {ITEM.VALUE2})'
      opdata: 'Available: {ITEM.LASTVALUE1}, total: {ITEM.LASTVALUE2}'
      priority: AVERAGE
      description: 'The system is running out of memory.'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
    - uuid: 285bf55ebb58421da024818537b2eb13
      expression: |
        min(/Proxmox by Linux Zabbix agent/system.cpu.load[all,avg1],5m)/last(/Proxmox by Linux Zabbix agent/system.cpu.num)>1.5
        and last(/Proxmox by Linux Zabbix agent/system.cpu.load[all,avg5])>0
        and last(/Proxmox by Linux Zabbix agent/system.cpu.load[all,avg15])>0
      name: 'Linux: Load average is too high'
      event_name: 'Linux: Load average is too high (per CPU load over {$LOAD_AVG_PER_CPU.MAX.WARN} for 5m)'
      opdata: 'Load averages(1m 5m 15m): ({ITEM.LASTVALUE1} {ITEM.LASTVALUE3} {ITEM.LASTVALUE4}), # of CPUs: {ITEM.LASTVALUE2}'
      priority: AVERAGE
      description: 'The load average per CPU is too high. The system may be slow to respond.'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance

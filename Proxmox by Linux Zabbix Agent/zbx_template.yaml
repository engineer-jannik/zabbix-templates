zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: 8179703b59d04f3694e2da5ac97e8353
      template: 'Proxmox by Linux Zabbix agent'
      name: 'Proxmox by Linux Zabbix agent'
      description: |
        This template was created for a full monitoring of Proxmox VE hosts with the Linux Zabbix agent. It includes items for monitoring the state of Proxmox services, cluster quorum, and general system performance metrics. The template is designed to be used with Zabbix 7.4 and may require adjustments for other versions.
        
        Please read https://github.com/engineer-jannik/zabbix-templates/tree/main/Proxmox%20by%20Linux%20Zabbix%20Agent to install the template right.
        This template was made by: Jannik H.
      vendor:
        name: 'Jannik H.'
        version: 7.4-2
      groups:
        - name: Templates
      items:
        - uuid: 8c65c028f349465fa92b87a4490af814
          name: 'Host name of Zabbix agent running'
          key: agent.hostname
          delay: 1h
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 66f55540fc4247d08caab96b23656a07
          name: 'Zabbix agent ping'
          key: agent.ping
          description: 'The agent always returns "1" for this item. May be used in combination with `nodata()` for the availability check.'
          tags:
            - tag: component
              value: system
        - uuid: 5f36e7e6d7c24e5e8ca6a9a53857b036
          name: 'Version of Zabbix agent running'
          key: agent.version
          delay: 1h
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: application
        - uuid: 84b77bb4cf4c4fb4a02feb4865733ee5
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: 20s
          valuemap:
            name: 'Service State (UP/DOWN)'
          tags:
            - tag: component
              value: icmp
            - tag: component
              value: system
          triggers:
            - uuid: ad85bda25416494e9806c91283ebb1ca
              expression: 'last(/Proxmox by Linux Zabbix agent/icmpping,#3)=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Proxmox by Linux Zabbix agent/icmpping,#3)=1'
              name: 'Host is down.'
              priority: DISASTER
              description: 'The last 3 icmp pings has been 0(DOWN)'
              tags:
                - tag: scope
                  value: availability
        - uuid: 3c5508402c1c4d909a25a3c4cba82b49
          name: 'Maximum number of open file descriptors'
          key: kernel.maxfiles
          delay: 1h
          description: 'May be increased by using the `sysctl` utility or modifying the file `/etc/sysctl.conf`.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 20b2d73a43d64503af373afc884f618d
          name: 'Maximum number of processes'
          key: kernel.maxproc
          delay: 1h
          description: 'May be increased by using the `sysctl` utility or modifying the file `/etc/sysctl.conf`.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 1fbbcf27495542e89622c54298db3b60
              expression: 'last(/Proxmox by Linux Zabbix agent/kernel.maxproc)<1024'
              name: 'Linux: Configured max number of processes is too low'
              event_name: 'Linux: Configured max number of processes is too low (< {$KERNEL.MAXPROC.MIN})'
              priority: INFO
              dependencies:
                - name: 'Linux: Getting closer to process limit'
                  expression: 'last(/Proxmox by Linux Zabbix agent/proc.num)/last(/Proxmox by Linux Zabbix agent/kernel.maxproc)*100>80'
              tags:
                - tag: scope
                  value: performance
        - uuid: ef1acb8477284fe9864667eb8764e5bf
          name: 'Number of processes'
          key: proc.num
          tags:
            - tag: component
              value: system
        - uuid: 8d072056e0db435ea8197be8cd3fad64
          name: 'Number of running processes'
          key: 'proc.num[,,run]'
          tags:
            - tag: component
              value: system
        - uuid: fb48e14f1dc64e868f717e0abd0e5c27
          name: 'Quorum State'
          key: proxmox.quorum.status
          description: 'State of quorum from cluster'
          valuemap:
            name: 'Service State (OK/UNHEALTHY)'
          tags:
            - tag: component
              value: proxmox
            - tag: component
              value: service
          triggers:
            - uuid: 6472280b4f7b46168c1fc30edec7f04b
              expression: 'last(/Proxmox by Linux Zabbix agent/proxmox.quorum.status,#3)<>1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Proxmox by Linux Zabbix agent/proxmox.quorum.status,#3)=1'
              name: 'Proxmox: Quorum is unhealthy'
              priority: HIGH
        - uuid: bac866571c554f549dfd7bd8b68809b6
          name: 'Service State(Cluster): corosync.service'
          key: 'pve.service.state["corosync"]'
